# ================================
# SHELL
# ================================
set -g default-command "/opt/homebrew/bin/zsh"
set -g default-shell "/opt/homebrew/bin/zsh"

# ================================
# TPM PLUGINS
# ================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Tema Kanagawa / Ukiyo with DevRocket status metrics
set -g @plugin 'IsaiasUziel/tmux-ukiyo'
set -g @kanagawa-theme 'dragon'
set -g @kanagawa-plugins "git cpu-usage ram-usage disk-free"
set -g @kanagawa-ignore-window-colors true

# ================================
# TERMINAL
# ================================
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -s extended-keys off

# ================================
# LEADER (estilo nvim)
# ================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Leader alternativo (muy cómodo)
bind-key -n C-Space send-prefix

# ================================
# MODO VIM
# ================================
set -g mode-keys vi

if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# ================================
# SPLITS (como vim)
# ================================
unbind %
unbind '"'

bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"

# ================================
# NAVEGACIÓN (hjkl)
# ================================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ================================
# VENTANAS (tabs)
# ================================
bind t new-window -c "#{pane_current_path}"
bind w kill-window
bind n next-window
bind p previous-window

# Acceso rápido por número
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# ================================
# POPUPS / UTILS
# ================================
# Scratch terminal
bind g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}

# Cheatsheet
bind c display-popup -E -w 80% -h 80% "tmux-cheatsheet"

# ================================
# SISTEMA
# ================================
set -g mouse on
set -g status-position top

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Index desde 1
set -g base-index 1
setw -g pane-base-index 1

# ================================
# TPM INIT
# ================================
run '~/.tmux/plugins/tpm/tpm'
